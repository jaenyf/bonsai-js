name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Performance gate
        run: bun run bench:gate

      - name: Check package exports
        run: |
          npm pack --pack-destination /tmp
          npx --yes @arethetypeswrong/cli /tmp/bonsai-js-*.tgz --ignore-rules no-resolution cjs-resolves-to-esm

  node-compat:
    name: Node ${{ matrix.node-version }} smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: bun install --frozen-lockfile

      - name: Packed package smoke test
        run: bun run check:package
